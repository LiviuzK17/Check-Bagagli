<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Bagagli Ciurma ⚓</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚓</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #1a0f07;
      --bg-card:     #2b1a0e;
      --bg-elevated: #3a2410;
      --bg-input:    #1f1208;
      --gold:        #d4922a;
      --gold-light:  #f0b84a;
      --gold-dim:    rgba(212,146,42,0.25);
      --red:         #8b1a1a;
      --red-light:   #c0392b;
      --rope:        #8b6b3d;
      --text:        #f0e0c0;
      --text-dim:    #a08060;
      --success:     #6aaa5e;
      --danger:      #e05050;
      --border:      rgba(180,130,60,0.28);
      --radius:      10px;
      --tr:          0.18s ease;
      --wood-grain:  repeating-linear-gradient(
        93deg,
        transparent 0px, transparent 18px,
        rgba(0,0,0,0.06) 18px, rgba(0,0,0,0.06) 20px
      );
    }

    body {
      background: var(--bg);
      background-image: var(--wood-grain), linear-gradient(160deg, #1a0f07 0%, #0f0a04 100%);
      color: var(--text);
      font-family: 'Georgia', 'Palatino Linotype', serif;
      min-height: 100dvh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 70% 35% at 15% 0%, rgba(212,146,42,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 85% 100%, rgba(139,27,27,0.06) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(20,10,4,0.95);
      backdrop-filter: blur(14px);
      border-bottom: 2px solid var(--rope);
      box-shadow: 0 3px 18px rgba(0,0,0,0.6);
    }
    .header::after {
      content: '';
      display: block; height: 3px;
      background: repeating-linear-gradient(
        90deg, var(--rope) 0px, var(--rope) 8px,
        var(--bg-elevated) 8px, var(--bg-elevated) 12px
      );
      opacity: 0.6;
    }
    .header-inner {
      max-width: 1100px; margin: 0 auto;
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon { font-size: 1.8rem; line-height: 1; filter: drop-shadow(0 0 8px rgba(212,146,42,0.6)); }
    .brand h1 { font-size: 1.2rem; font-weight: 700; color: var(--gold-light); letter-spacing: 1px; text-shadow: 0 2px 6px rgba(0,0,0,0.8); }
    .brand .tagline { font-size: 0.7rem; color: var(--text-dim); margin-top: 2px; line-height: 1; font-style: italic; }
    .sync-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 13px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.72rem; color: var(--text-dim);
      white-space: nowrap; flex-shrink: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .sync-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--success);
      animation: blink 2.5s infinite;
    }
    .sync-dot.busy { background: var(--gold); animation: blink 0.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .main {
      position: relative; z-index: 1;
      max-width: 1100px; margin: 0 auto;
      padding: 24px 20px 100px;
    }

    .loading {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 60vh; gap: 18px;
      color: var(--text-dim); font-size: 0.9rem;
    }
    .spinner {
      width: 42px; height: 42px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .section-row {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-label {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2.5px;
      color: var(--gold);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .crew-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 36px; }

    .crew-card {
      position: relative;
      background: var(--bg-card);
      background-image: var(--wood-grain);
      border: 2px solid var(--rope);
      border-radius: var(--radius);
      padding: 16px 10px 12px;
      text-align: center;
      cursor: grab;
      transition: transform var(--tr), border-color var(--tr), background var(--tr), box-shadow var(--tr);
      user-select: none;
      width: 110px; flex-shrink: 0;
      box-shadow: inset 0 1px 0 rgba(255,220,100,0.1), 0 3px 10px rgba(0,0,0,0.5);
    }
    .crew-card:active { cursor: grabbing; }
    .crew-card:hover {
      transform: translateY(-3px);
      border-color: var(--gold);
      box-shadow: 0 6px 18px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,220,100,0.15);
    }
    .crew-card.active {
      border-color: var(--gold-light);
      background: var(--bg-elevated);
      background-image: var(--wood-grain);
      box-shadow: 0 0 22px rgba(212,146,42,0.25), inset 0 1px 0 rgba(255,220,100,0.2);
    }
    .crew-card.dragging { opacity: 0.4; cursor: grabbing; transform: scale(0.95); }
    .crew-card.drag-over { border-color: var(--gold-light); box-shadow: 0 0 16px rgba(212,146,42,0.5); }

    .crew-card .c-emoji { font-size: 2.3rem; line-height: 1; display: block; margin-bottom: 8px; }
    .crew-card .c-name { font-size: 0.78rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .crew-card .c-pct {
      position: absolute; top: 7px; right: 7px;
      font-size: 0.6rem; font-weight: 700; color: var(--gold);
      background: rgba(212,146,42,0.15);
      border-radius: 8px; padding: 2px 5px;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .crew-card .c-edit {
      position: absolute; top: 5px; left: 5px;
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: 1px solid var(--border);
      color: var(--text-dim); font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; opacity: 0;
      transition: opacity var(--tr);
    }
    .crew-card:hover .c-edit { opacity: 1; }
    .crew-card .c-drag-hint {
      position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
      font-size: 0.55rem; color: var(--text-dim);
      opacity: 0; transition: opacity var(--tr);
      pointer-events: none; white-space: nowrap;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .crew-card:hover .c-drag-hint { opacity: 0.7; }

    .btn-outline {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 13px;
      background: transparent;
      border: 1px solid var(--gold);
      border-radius: 8px;
      color: var(--gold); font-size: 0.78rem; font-weight: 600;
      cursor: pointer; transition: background var(--tr);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .btn-outline:hover { background: var(--gold-dim); }

    .cl-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .cl-header .big-icon { font-size: 2rem; line-height: 1; }
    .cl-header .cl-info h2 { font-size: 1.2rem; font-weight: 700; color: var(--gold-light); }
    .cl-header .cl-info .cl-sub { font-size: 0.78rem; color: var(--text-dim); margin-top: 3px; font-family: 'Segoe UI', system-ui, sans-serif; }

    .progress-bar {
      width: 100%; height: 6px;
      background: var(--bg-elevated);
      border-radius: 3px; margin-bottom: 28px;
      overflow: hidden; border: 1px solid var(--border);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red-light), var(--gold-light));
      border-radius: 3px; transition: width 0.5s ease;
    }

    .cat-group { margin-bottom: 20px; }
    .cat-header {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 0; margin-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .cat-label {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--gold);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .cat-count {
      margin-left: auto;
      font-size: 0.68rem; color: var(--text-dim);
      background: var(--bg-elevated);
      border-radius: 8px; padding: 2px 7px;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .cl-item {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 10px; border-radius: 8px;
      cursor: pointer;
      transition: background var(--tr);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .cl-item:hover { background: var(--bg-card); }
    .cl-item.checked .cl-item-name { text-decoration: line-through; color: var(--text-dim); }
    .cl-checkbox {
      flex-shrink: 0; width: 20px; height: 20px;
      border-radius: 6px; border: 2px solid var(--rope);
      display: flex; align-items: center; justify-content: center;
      transition: background var(--tr), border-color var(--tr); font-size: 12px;
    }
    .cl-item.checked .cl-checkbox { background: var(--success); border-color: var(--success); color: #000; }
    .cl-item-name { flex: 1; font-size: 0.93rem; }
    .cl-del {
      flex-shrink: 0; width: 28px; height: 28px;
      border-radius: 6px; border: none;
      background: transparent; color: var(--danger); font-size: 17px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; opacity: 0;
      transition: opacity var(--tr), background var(--tr);
    }
    .cl-item:hover .cl-del { opacity: 0.55; }
    .cl-del:hover { opacity: 1 !important; background: rgba(224,80,80,0.14); }

    .add-item-bar {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-top: 22px; padding: 13px 15px;
      background: var(--bg-card);
      background-image: var(--wood-grain);
      border: 1px dashed rgba(180,130,60,0.4);
      border-radius: var(--radius); align-items: center;
    }
    .add-item-input {
      flex: 1; min-width: 140px;
      background: transparent; border: none; outline: none;
      color: var(--text); font-size: 0.9rem; font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .add-item-input::placeholder { color: var(--text-dim); }

    .checklist-panel {
      background: var(--bg-card);
      background-image: var(--wood-grain);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 22px 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,200,80,0.07);
    }

    .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
    .empty .e-icon { font-size: 3rem; margin-bottom: 14px; }
    .empty p { font-size: 0.9rem; line-height: 1.6; font-family: 'Segoe UI', system-ui, sans-serif; }

    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.78);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .overlay.hidden { display: none; }
    .modal {
      background: var(--bg-card);
      background-image: var(--wood-grain);
      border: 1px solid var(--rope);
      border-radius: 18px; padding: 26px;
      width: 100%; max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.85);
    }
    .modal h3 { font-size: 1.05rem; font-weight: 700; color: var(--gold-light); margin-bottom: 20px; }
    .form-row { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--text-dim); margin-bottom: 7px;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .form-input {
      width: 100%; padding: 10px 13px;
      background: var(--bg-input);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 0.97rem; font-family: inherit;
      outline: none; transition: border-color var(--tr);
    }
    .form-input:focus { border-color: var(--gold); }
    .emoji-preview {
      font-size: 2.6rem; text-align: center;
      padding: 12px; background: var(--bg-elevated);
      border-radius: 12px; margin-bottom: 12px; line-height: 1;
    }
    .emoji-grid {
      display: grid; grid-template-columns: repeat(9, 1fr); gap: 5px;
      max-height: 190px; overflow-y: auto; padding: 8px;
      background: var(--bg-input);
      border: 1px solid var(--border); border-radius: 8px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .e-btn {
      font-size: 1.3rem; padding: 5px;
      border-radius: 6px; border: 2px solid transparent;
      background: transparent; cursor: pointer; line-height: 1; text-align: center;
      transition: background var(--tr), border-color var(--tr);
    }
    .e-btn:hover { background: var(--bg-elevated); }
    .e-btn.sel { border-color: var(--gold); background: var(--gold-dim); }
    .modal-actions { display: flex; gap: 9px; margin-top: 22px; }
    .btn-save {
      flex: 2; padding: 10px;
      background: var(--gold); border: none; border-radius: 8px;
      color: #1a0f07; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: background var(--tr);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .btn-save:hover { background: var(--gold-light); }
    .btn-cancel {
      flex: 1; padding: 10px;
      background: transparent;
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text-dim); font-size: 0.9rem;
      cursor: pointer; transition: border-color var(--tr), color var(--tr);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .btn-cancel:hover { border-color: var(--text-dim); color: var(--text); }
    .btn-danger {
      flex: 1; padding: 10px;
      background: transparent;
      border: 1px solid var(--danger); border-radius: 8px;
      color: var(--danger); font-size: 0.9rem;
      cursor: pointer; transition: background var(--tr);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .btn-danger:hover { background: rgba(224,80,80,0.12); }

    .toast {
      position: fixed; bottom: 22px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg-elevated);
      border: 1px solid var(--rope);
      border-radius: 10px; padding: 10px 20px;
      font-size: 0.82rem; color: var(--text);
      z-index: 2000; transition: transform 0.28s ease;
      white-space: nowrap; pointer-events: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .rope-divider {
      height: 2px;
      background: repeating-linear-gradient(
        90deg, var(--rope) 0px, var(--rope) 10px,
        transparent 10px, transparent 14px
      );
      border-radius: 2px; margin: 0 0 28px; opacity: 0.5;
    }

    /* ── Custom Category Dropdown ── */
    .cat-select-wrapper { position: relative; width: 160px; flex-shrink: 0; }
    .cat-select-btn {
      width: 100%; padding: 7px 10px;
      background: var(--bg-elevated);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 0.82rem;
      font-family: 'Segoe UI', system-ui, sans-serif;
      cursor: pointer; text-align: left; outline: none;
      transition: border-color var(--tr), background var(--tr);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: flex; align-items: center; justify-content: space-between; gap: 4px;
    }
    .cat-select-btn:focus,
    .cat-select-btn.open { border-color: var(--gold); background: var(--bg-card); }
    .cat-select-arrow { color: var(--gold); font-size: 0.9rem; pointer-events: none; flex-shrink: 0; }
    .cat-dropdown {
      position: absolute; top: calc(100% + 5px); left: 0; width: 210px;
      background: var(--bg-card); background-image: var(--wood-grain);
      border: 1px solid var(--rope); border-radius: 10px;
      box-shadow: 0 10px 36px rgba(0,0,0,0.7);
      z-index: 500; overflow: hidden; display: none;
      animation: dropIn 0.15s ease;
    }
    .cat-dropdown.open { display: block; }
    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .cat-option {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; cursor: pointer;
      font-size: 0.88rem; font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text); transition: background var(--tr);
      border-bottom: 1px solid rgba(180,130,60,0.1);
    }
    .cat-option:last-child { border-bottom: none; }
    .cat-option:hover { background: var(--bg-elevated); }
    .cat-option.selected { background: var(--gold-dim); color: var(--gold-light); font-weight: 600; }
    .cat-option .cat-opt-icon { font-size: 1.1rem; flex-shrink: 0; }
    .cat-option .cat-opt-label { flex: 1; }

    @media (max-width: 580px) {
      .main { padding: 18px 12px 80px; }
      .crew-grid { flex-wrap: wrap; }
      .crew-card { width: calc(50% - 5px); }
      .brand h1 { font-size: 0.97rem; }
      .sync-pill { display: none; }
      .add-item-bar { flex-direction: column; align-items: stretch; }
      .cat-select-wrapper { width: 100%; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-icon">☠️</span>
      <div>
        <h1>Check Bagagli Ciurma</h1>
        <div class="tagline">Ogni pirata tiene il suo bottino in ordine</div>
      </div>
    </div>
    <div class="sync-pill">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">Locale</span>
    </div>
  </div>
</header>

<!-- Main content -->
<main class="main" id="app">
  <div class="loading" id="loadingScreen">
    <div class="spinner"></div>
    <span>Caricamento ciurma...</span>
  </div>
  <div id="mainContent" style="display:none">
    <div class="section-row">
      <span class="section-label">⚓ La Ciurma</span>
      <button class="btn-outline" onclick="openAddMember()">＋ Aggiungi membro</button>
    </div>
    <div class="crew-grid" id="crewGrid"></div>
    <div class="rope-divider"></div>
    <div id="checklistSection"></div>
  </div>
</main>

<!-- Edit Member Modal -->
<div class="overlay hidden" id="editMemberOverlay">
  <div class="modal">
    <h3>✏️ Modifica Membro</h3>
    <div class="emoji-preview" id="editEmojiPreview"></div>
    <div class="form-row">
      <label class="form-label">Nome</label>
      <input class="form-input" id="editMemberName" type="text" maxlength="22" placeholder="Nome membro">
    </div>
    <div class="form-row">
      <label class="form-label">Icona</label>
      <div class="emoji-grid" id="editEmojiGrid"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-danger" id="deleteMemberBtn" onclick="deleteMember()">Elimina</button>
      <button class="btn-cancel" onclick="closeModal('editMemberOverlay')">Annulla</button>
      <button class="btn-save" onclick="saveMember()">Salva</button>
    </div>
  </div>
</div>

<!-- Add Member Modal -->
<div class="overlay hidden" id="addMemberOverlay">
  <div class="modal">
    <h3>🏴‍☠️ Nuovo Membro</h3>
    <div class="emoji-preview" id="addEmojiPreview">🧳</div>
    <div class="form-row">
      <label class="form-label">Nome</label>
      <input class="form-input" id="addMemberName" type="text" maxlength="22" placeholder="Nome del membro">
    </div>
    <div class="form-row">
      <label class="form-label">Icona</label>
      <div class="emoji-grid" id="addEmojiGrid"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('addMemberOverlay')">Annulla</button>
      <button class="btn-save" onclick="addMember()">Aggiungi</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js';
import {
  getFirestore, doc, getDoc, setDoc, deleteDoc
} from 'https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBdZ264Yz_C-ev2BukH1z4cVDPaDr60wD0",
  authDomain: "check-bagagli.firebaseapp.com",
  projectId: "check-bagagli",
  storageBucket: "check-bagagli.firebasestorage.app",
  messagingSenderId: "957942770779",
  appId: "1:957942770779:web:cca513831cabbe7feae37e"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);

const DOC = {
  members: () => doc(db, 'ciurma', 'members'),
  checks:  () => doc(db, 'ciurma', 'checks'),
  items:   (id) => doc(db, 'ciurma', 'items_' + id)
};


// ── Constants ──
const EMOJIS = [
  '⚓','🧭','🌊','🚢','⛵','🏖️','🌴','🐚','🦈','🐬',
  '👨‍✈️','👩‍✈️','🧑‍✈️','👨‍🍳','👩‍🍳','🧑‍🍳','💊','🩺','👨‍🔧','👩‍🔧',
  '🧑‍🔧','🕵️','🧙','🦸','🏄','🤿','🧜','🌞','🌙','⭐',
  '🎯','🍹','☕','🎸','📷','🎨','🗺️','🧳','🎒','⚙️',
  '🔭','🏆','🦁','🦊','🦅','🦋','🐉','🦄','🐙','🌺',
  '🏴‍☠️','☠️','⚔️','🗡️','🔱','🪙','💰','🦜','🍾','🧨',
];

const CAT_ICONS = {
  'Vestiti':             '👕',
  'Igiene':              '🧴',
  'Salute':              '💊',
  'Documenti e Finanze': '📋',
  'Tecnologia':          '💻',
  'Libri e Giocattoli':  '📚',
  'Accessori':           '🎒',
  'Altro':               '📦',
};
const DEFAULT_CATS = Object.keys(CAT_ICONS);

// ── LocalStorage keys ──
const LS = {
  members:     'pirate_members',
  checks:      'pirate_checks',
  memberOrder: 'pirate_member_order',
  itemsFor:    id => `pirate_items_${id}`,
};

const DEFAULT_MEMBERS = [
  { id: 1, name: 'Capitano', icon: '🏴‍☠️' },
  { id: 2, name: 'Mozzo',    icon: '⚓' },
];

function lsGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch(e) { return fallback; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

function lsLoadState() {
  const members = lsGet(LS.members, DEFAULT_MEMBERS);
  const checks  = lsGet(LS.checks,  []);
  return { members, items: [], checks };
}
function lsSaveMembers(members) { lsSet(LS.members, members); }
function lsSaveChecks(checks)   { lsSet(LS.checks,  checks);  }

function lsUpsertCheck(memberId, itemId, checked) {
  const checks = lsGet(LS.checks, []);
  const idx = checks.findIndex(c => c.memberId === memberId && c.itemId === itemId);
  if (idx >= 0) checks[idx].checked = checked;
  else checks.push({ memberId, itemId, checked });
  lsSaveChecks(checks);
}

// ── LocalStorage API ──
let _nextMemberId = null;

function getNextMemberId() {
  if (_nextMemberId === null) {
    const members = lsGet(LS.members, DEFAULT_MEMBERS);
    _nextMemberId = members.reduce((max, m) => Math.max(max, m.id), 0) + 1;
  }
  return _nextMemberId++;
}

function localApi(method, path, body) {
  if (method === 'GET' && path === '/api/state') {
    return lsLoadState();
  }
  if (method === 'POST' && path === '/api/members') {
    const members = lsGet(LS.members, DEFAULT_MEMBERS);
    const newMember = { id: getNextMemberId(), name: body.name, icon: body.icon };
    members.push(newMember);
    lsSaveMembers(members);
    return newMember;
  }
  if (method === 'PUT' && path.startsWith('/api/members/')) {
    const id = parseInt(path.split('/').pop());
    const members = lsGet(LS.members, DEFAULT_MEMBERS);
    const idx = members.findIndex(m => m.id === id);
    if (idx >= 0) { members[idx].name = body.name; members[idx].icon = body.icon; }
    lsSaveMembers(members);
    return members[idx] || null;
  }
  if (method === 'DELETE' && path.startsWith('/api/members/')) {
    const id = parseInt(path.split('/').pop());
    const members = lsGet(LS.members, DEFAULT_MEMBERS).filter(m => m.id !== id);
    lsSaveMembers(members);
    localStorage.removeItem(LS.itemsFor(id));
    const checks = lsGet(LS.checks, []).filter(c => c.memberId !== id);
    lsSaveChecks(checks);
    return null;
  }
  if (method === 'PUT' && path.startsWith('/api/checks/')) {
    const parts = path.split('/');
    const mId = parseInt(parts[3]);
    const iId = parseInt(parts[4]);
    lsUpsertCheck(mId, iId, body.checked);
    return null;
  }
  throw new Error(`localApi: route non gestita: ${method} ${path}`);
}

// ── Sempre in modalità locale (standalone HTML) ──
function api(method, path, body) {
  return Promise.resolve(localApi(method, path, body));
}

// ── State ──
let state = {
  members: [],
  items: [],
  checks: {},
  memberItems: {},
  activeMemberId: null,
};
let editingMemberId   = null;
let editSelectedEmoji = null;
let addSelectedEmoji  = '🧳';
let localItemCounter  = -1;

// ── Member items (private per membro) ──
function loadMemberItems(memberId) {
  const raw = lsGet(LS.itemsFor(memberId), null);
  return raw !== null ? raw : [];
}
function saveMemberItems(memberId, items) { lsSet(LS.itemsFor(memberId), items); }
function getMemberItems(memberId) {
  if (!state.memberItems[memberId]) {
    state.memberItems[memberId] = loadMemberItems(memberId);
  }
  return state.memberItems[memberId];
}

function checksKey(mId, iId) { return `${mId}_${iId}`; }

function applyState(data) {
  state.members = data.members;
  state.items   = data.items;
  state.checks  = {};
  for (const c of data.checks) {
    state.checks[checksKey(c.memberId, c.itemId)] = c.checked;
  }
  const savedOrder = lsGet(LS.memberOrder, null);
  if (savedOrder && savedOrder.length > 0) {
    const map = new Map(state.members.map(m => [m.id, m]));
    const sorted = savedOrder.map(id => map.get(id)).filter(Boolean);
    for (const m of state.members) { if (!savedOrder.includes(m.id)) sorted.push(m); }
    state.members = sorted;
  }
  for (const m of state.members) {
    if (!state.memberItems[m.id]) {
      state.memberItems[m.id] = loadMemberItems(m.id);
    }
  }
  if (!state.activeMemberId) {
    state.activeMemberId = state.members[0]?.id ?? null;
  } else if (!state.members.find(m => m.id === state.activeMemberId)) {
    state.activeMemberId = state.members[0]?.id ?? null;
  }
}

// ── Sync indicator ──
function setSyncing(busy) {
  const dot  = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  if (busy) {
    dot.classList.add('busy');
    text.textContent = 'Salvataggio…';
  } else {
    dot.classList.remove('busy');
    text.textContent = 'Locale';
  }
}

// ── Fetch & render ──
async function fetchState(flash = false) {
  if (flash) setSyncing(true);
  try {
    const data = await api('GET', '/api/state');
    applyState(data);
    renderAll();
  } catch(e) {
    console.error('fetchState error', e);
  } finally {
    setSyncing(false);
  }
}

function setActiveMember(id) {
  state.activeMemberId = id;
  currentCatValue = 'Altro';
  renderAll();
}

// ── Render ──
function renderAll() {
  renderCrewGrid();
  renderChecklist();
}

function renderCrewGrid() {
  const grid = document.getElementById('crewGrid');
  if (!grid) return;

  grid.innerHTML = state.members.map(m => {
    const items    = getMemberItems(m.id);
    const total    = items.length;
    const checked  = items.filter(i => state.checks[checksKey(m.id, i.id)]).length;
    const pct      = total > 0 ? Math.round(checked / total * 100) : 0;
    const isActive = m.id === state.activeMemberId;

    return `
      <div class="crew-card${isActive ? ' active' : ''}"
           draggable="true"
           data-id="${m.id}"
           onclick="setActiveMember(${m.id})">
        <button class="c-edit" title="Modifica" onclick="openEditMember(${m.id}, event)">✎</button>
        <span class="c-emoji">${m.icon}</span>
        <span class="c-name">${esc(m.name)}</span>
        ${total > 0 ? `<span class="c-pct">${pct}%</span>` : ''}
        <span class="c-drag-hint">≡ trascina</span>
      </div>`;
  }).join('');

  // Drag & drop per riordino
  grid.querySelectorAll('.crew-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', card.dataset.id);
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
    card.addEventListener('dragover', e => {
      e.preventDefault();
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      const fromId = parseInt(e.dataTransfer.getData('text/plain'));
      const toId   = parseInt(card.dataset.id);
      if (fromId === toId) return;
      const fromIdx = state.members.findIndex(m => m.id === fromId);
      const toIdx   = state.members.findIndex(m => m.id === toId);
      if (fromIdx < 0 || toIdx < 0) return;
      const [moved] = state.members.splice(fromIdx, 1);
      state.members.splice(toIdx, 0, moved);
      lsSet(LS.memberOrder, state.members.map(m => m.id));
      renderAll();
    });
  });
}

function renderChecklist() {
  const section = document.getElementById('checklistSection');
  if (!section) return;

  const member = state.members.find(m => m.id === state.activeMemberId);
  if (!member) {
    section.innerHTML = '<div class="empty"><div class="e-icon">⚓</div><p>Seleziona un membro della ciurma.</p></div>';
    return;
  }

  const myItems  = getMemberItems(member.id);
  const total    = myItems.length;
  const checked  = myItems.filter(i => state.checks[checksKey(member.id, i.id)]).length;
  const pct      = total > 0 ? Math.round(checked / total * 100) : 0;

  // Raggruppa per categoria
  const cats = {};
  for (const item of myItems) {
    const cat = item.category || 'Altro';
    if (!cats[cat]) cats[cat] = [];
    cats[cat].push(item);
  }

  // Calcola categorie disponibili (default + quelle già usate)
  const usedCats = Object.keys(cats);
  const allCats  = [...new Set([...DEFAULT_CATS, ...usedCats])];

  let html = `
    <div class="cl-header">
      <span class="big-icon">${member.icon}</span>
      <div class="cl-info">
        <h2>${esc(member.name)}</h2>
        <div class="cl-sub">${checked} / ${total} articoli pronti · ${pct}%</div>
      </div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>
    <div class="checklist-panel">`;

  if (myItems.length === 0) {
    html += `<div class="empty"><div class="e-icon">📦</div><p>Nessun articolo nella lista.<br>Aggiungine uno qui sotto!</p></div>`;
  }

  for (const [cat, items] of Object.entries(cats)) {
    const catChecked = items.filter(i => state.checks[checksKey(member.id, i.id)]).length;
    const icon = CAT_ICONS[cat] || '📦';
    html += `<div class="cat-group">
      <div class="cat-header">
        <span>${icon}</span>
        <span class="cat-label">${esc(cat)}</span>
        <span class="cat-count">${catChecked}/${items.length}</span>
      </div>`;
    for (const item of items) {
      const isChecked = state.checks[checksKey(member.id, item.id)] || false;
      html += `
        <div class="cl-item${isChecked ? ' checked' : ''}" onclick="toggleCheck(${member.id},${item.id})">
          <div class="cl-checkbox">${isChecked ? '✓' : ''}</div>
          <span class="cl-item-name">${esc(item.name)}</span>
          <button class="cl-del" title="Elimina" onclick="delItem(${member.id},${item.id},event)">×</button>
        </div>`;
    }
    html += '</div>';
  }

  // Dropdown opzioni categoria
  const dropOpts = allCats.map(cat => {
    const icon = CAT_ICONS[cat] || '📦';
    return `<div class="cat-option" data-val="${esc(cat)}" onclick="selectCatOption(this)">
      <span class="cat-opt-icon">${icon}</span>
      <span class="cat-opt-label">${esc(cat)}</span>
    </div>`;
  }).join('');

  const currentIcon  = CAT_ICONS[currentCatValue] || '📦';

  html += `
    <div class="add-item-bar">
      <input class="add-item-input" id="newItemName" type="text" maxlength="60"
        placeholder="＋ Aggiungi articolo…"
        onkeydown="if(event.key==='Enter')submitItem()">
      <div class="cat-select-wrapper" id="catSelectWrapper">
        <button class="cat-select-btn" id="catSelectBtn" type="button" onclick="toggleCatDropdown(event)">
          <span id="catSelectLabel">${currentIcon} ${esc(currentCatValue)}</span>
          <span class="cat-select-arrow">▾</span>
        </button>
        <div class="cat-dropdown" id="catDropdown">${dropOpts}</div>
        <input type="hidden" id="newItemCat" value="${esc(currentCatValue)}">
      </div>
      <button class="btn-add-item" onclick="submitItem()">Aggiungi</button>
    </div>
  </div>`;

  section.innerHTML = html;
}

// ── Actions ──
async function toggleCheck(memberId, itemId) {
  const key    = checksKey(memberId, itemId);
  const before = state.checks[key] || false;
  state.checks[key] = !before;
  lsUpsertCheck(memberId, itemId, !before);
  renderAll();
}

function submitItem() {
  const nameEl = document.getElementById('newItemName');
  const catEl  = document.getElementById('newItemCat');
  const name   = nameEl.value.trim();
  if (!name) { nameEl.focus(); return; }
  const category = catEl ? catEl.value.trim() || 'Altro' : 'Altro';
  nameEl.value = '';

  const memberId = state.activeMemberId;
  if (!memberId) return;

  const newId  = localItemCounter--;
  const myItems = getMemberItems(memberId);
  myItems.push({ id: newId, name, category });
  saveMemberItems(memberId, myItems);
  renderAll();
  showToast('Articolo aggiunto alla tua lista!');
}

function delItem(memberId, itemId, e) {
  e.stopPropagation();
  if (!confirm('Eliminare questo articolo dalla tua lista?')) return;
  const myItems = getMemberItems(memberId);
  const idx = myItems.findIndex(i => i.id === itemId);
  if (idx !== -1) myItems.splice(idx, 1);
  saveMemberItems(memberId, myItems);
  delete state.checks[checksKey(memberId, itemId)];
  const checks = lsGet(LS.checks, []).filter(c => !(c.memberId === memberId && c.itemId === itemId));
  lsSaveChecks(checks);
  renderAll();
  showToast('Articolo eliminato dalla tua lista');
}

// ── Edit member ──
function openEditMember(memberId, e) {
  e.stopPropagation();
  editingMemberId = memberId;
  const m = state.members.find(x => x.id === memberId);
  if (!m) return;
  editSelectedEmoji = m.icon;
  document.getElementById('editMemberName').value = m.name;
  document.getElementById('editEmojiPreview').textContent = m.icon;
  document.getElementById('deleteMemberBtn').style.display = state.members.length > 1 ? '' : 'none';
  buildEmojiGrid('editEmojiGrid', m.icon, emoji => {
    editSelectedEmoji = emoji;
    document.getElementById('editEmojiPreview').textContent = emoji;
  });
  document.getElementById('editMemberOverlay').classList.remove('hidden');
}

async function saveMember() {
  const name = document.getElementById('editMemberName').value.trim();
  if (!name) return;
  await api('PUT', `/api/members/${editingMemberId}`, { name, icon: editSelectedEmoji });
  closeModal('editMemberOverlay');
  await fetchState(true);
  showToast('Membro aggiornato!');
}

async function deleteMember() {
  if (!confirm('Eliminare questo membro dalla ciurma?')) return;
  await api('DELETE', `/api/members/${editingMemberId}`);
  closeModal('editMemberOverlay');
  localStorage.removeItem(LS.itemsFor(editingMemberId));
  delete state.memberItems[editingMemberId];
  state.activeMemberId = null;
  await fetchState(true);
  showToast('Membro eliminato');
}

// ── Add member ──
function openAddMember() {
  addSelectedEmoji = '🧳';
  document.getElementById('addMemberName').value = '';
  document.getElementById('addEmojiPreview').textContent = addSelectedEmoji;
  buildEmojiGrid('addEmojiGrid', addSelectedEmoji, emoji => {
    addSelectedEmoji = emoji;
    document.getElementById('addEmojiPreview').textContent = emoji;
  });
  document.getElementById('addMemberOverlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('addMemberName').focus(), 80);
}

async function addMember() {
  const name = document.getElementById('addMemberName').value.trim();
  if (!name) { document.getElementById('addMemberName').focus(); return; }
  await api('POST', '/api/members', { name, icon: addSelectedEmoji });
  closeModal('addMemberOverlay');
  await fetchState(true);
  showToast('Nuovo membro aggiunto!');
}

// ── Emoji grid ──
function buildEmojiGrid(gridId, currentEmoji, onSelect) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = EMOJIS.map(e =>
    `<button class="e-btn${e === currentEmoji ? ' sel' : ''}" data-e="${e}">${e}</button>`
  ).join('');
  grid.onclick = ev => {
    const btn = ev.target.closest('.e-btn');
    if (!btn) return;
    const emoji = btn.dataset.e;
    grid.querySelectorAll('.e-btn').forEach(b => b.classList.toggle('sel', b.dataset.e === emoji));
    onSelect(emoji);
  };
}

// ── Modal helpers ──
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', ev => { if (ev.target === el) el.classList.add('hidden'); });
});

// ── Toast ──
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── XSS safety ──
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ── Custom Category Dropdown ──
let currentCatValue = 'Altro';

function toggleCatDropdown(e) {
  e.stopPropagation();
  const btn      = document.getElementById('catSelectBtn');
  const dropdown = document.getElementById('catDropdown');
  if (!dropdown) return;
  const isOpen = dropdown.classList.contains('open');
  closeAllDropdowns();
  if (!isOpen) {
    dropdown.classList.add('open');
    btn.classList.add('open');
    dropdown.querySelectorAll('.cat-option').forEach(opt => {
      opt.classList.toggle('selected', opt.dataset.val === currentCatValue);
    });
  }
}

function selectCatOption(el) {
  const val  = el.dataset.val;
  const icon = el.querySelector('.cat-opt-icon').textContent;
  const lbl  = el.querySelector('.cat-opt-label').textContent;
  currentCatValue = val;
  const hidden = document.getElementById('newItemCat');
  const label  = document.getElementById('catSelectLabel');
  if (hidden) hidden.value = val;
  if (label)  label.textContent = icon + ' ' + lbl;
  closeAllDropdowns();
}

function closeAllDropdowns() {
  document.querySelectorAll('.cat-dropdown').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('.cat-select-btn').forEach(b => b.classList.remove('open'));
}
document.addEventListener('click', () => closeAllDropdowns());

// ── Keyboard: Escape chiude modali ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal('editMemberOverlay');
    closeModal('addMemberOverlay');
    closeAllDropdowns();
  }
});

// ── Init ──
async function init() {
  try {
    await fetchState(false);
  } finally {
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainContent').style.display   = '';
  }
}

init();

// ── PATCH applyState per Firebase memberItems ──────────────────
const _origApplyState = applyState;
function applyState(data) {
  _origApplyState(data);
  if (data._memberItems) {
    for (const [id, items] of Object.entries(data._memberItems)) {
      state.memberItems[parseInt(id)] = items;
    }
  }
}


// ── PATCH saveMemberItems per Firestore ────────────────────────
const _origSaveMemberItems = saveMemberItems;
function saveMemberItems(memberId, items) {
  _origSaveMemberItems(memberId, items); // cache locale
  setDoc(DOC.items(memberId), { list: items }).catch(e => console.error('Firebase save items error', e));
}

</script>
