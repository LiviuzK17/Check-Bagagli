<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Bagagli - Ciurma Live</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Press+Start+2P&display=swap');

        :root {
            --gold: #D4AF37;
            --parchment: #F5E8C7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Press Start 2P', cursive;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), 
                        url('https://thumbs.dreamstime.com/b/dark-ship-deck-12737641.jpg') center/cover fixed;
            color: #fff;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(60, 47, 47, 0.95);
            border: 6px solid var(--gold);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.6);
            border-radius: 15px;
            overflow: hidden;
        }

        header {
            background: linear-gradient(#3C2F2F, #2C1F1F);
            padding: 20px 15px;
            text-align: center;
            border-bottom: 6px solid var(--gold);
        }

        h1 {
            font-family: 'Creepster', cursive;
            font-size: 2.6rem;
            color: var(--gold);
            text-shadow: 4px 4px 0 #000, -2px -2px 0 #000;
        }

        .main { display: flex; flex-wrap: wrap; gap: 15px; padding: 15px; }

        .sidebar {
            flex: 1;
            min-width: 280px;
            background: rgba(139, 90, 43, 0.35);
            padding: 15px;
            border: 4px solid var(--gold);
            border-radius: 10px;
        }

        .content { flex: 2; min-width: 300px; }

        .crew-member {
            padding: 12px;
            margin: 8px 0;
            background: var(--parchment);
            color: #333;
            border: 3px solid #3C2F2F;
            cursor: pointer;
            border-radius: 6px;
        }

        .crew-member:hover, .crew-member.active {
            background: var(--gold);
            color: #000;
        }

        .crew-header { display: flex; align-items: center; gap: 12px; }

        .icon-select {
            font-size: 2.1rem;
            cursor: pointer;
            padding: 4px;
        }

        .progress-bar {
            margin-top: 8px;
            height: 9px;
            background: #ddd;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #D4AF37, #b8860b);
        }

        .add-crew {
            width: 100%;
            padding: 14px;
            background: #D4AF37;
            color: #000;
            border: none;
            cursor: pointer;
            margin-top: 12px;
        }

        .category {
            background: rgba(245, 232, 199, 0.92);
            color: #222;
            margin-bottom: 16px;
            border-radius: 8px;
            overflow: hidden;
            border: 4px solid #3C2F2F;
        }

        .category-header {
            background: #3C2F2F;
            color: var(--gold);
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
        }

        .item-list { padding: 12px; max-height: 260px; overflow-y: auto; }
        .item { display: flex; align-items: center; padding: 10px 6px; border-bottom: 1px solid #ccc; }
        .add-item { display: flex; gap: 6px; padding: 10px 12px 12px; }
        .add-item input { flex: 1; padding: 12px; border: 2px solid #3C2F2F; }
        .add-item button { padding: 12px 16px; background: #3C2F2F; color: var(--gold); border: none; cursor: pointer; }

        .progress { text-align: center; margin: 18px 0; font-size: 1.25rem; color: var(--gold); }

        #icon-picker {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #3C2F2F;
            border: 6px solid var(--gold);
            padding: 20px;
            border-radius: 12px;
            display: none;
            flex-wrap: wrap;
            gap: 18px;
            z-index: 1000;
            max-width: 90%;
        }

        .icon-option {
            font-size: 2.8rem;
            padding: 12px;
            cursor: pointer;
            border-radius: 12px;
        }

        .icon-option:hover { background: rgba(212, 175, 55, 0.4); transform: scale(1.25); }

        @media (max-width: 768px) {
            .main { flex-direction: column; }
            h1 { font-size: 2.3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Check Bagagli</h1>
            <p class="subtitle">🏴‍☠️ Ciurma Live • Aggiornamenti in tempo reale 🏴‍☠️</p>
        </header>

        <div class="main">
            <div class="sidebar">
                <h2 style="color: var(--gold); margin-bottom: 12px;">👥 Magica Ciurma</h2>
                <div id="crew-list"></div>
                
                <input type="text" id="new-crew-name" placeholder="Nome del Pirata" 
                       style="width: 100%; padding: 12px; margin: 12px 0; border: 3px solid var(--gold);">
                <button onclick="addCrewMember()" class="add-crew">+ Arruola Nuovo Pirata</button>
            </div>

            <div class="content">
                <div id="no-selection" style="text-align:center; padding:80px 20px; color:#ddd;">
                    <h2 style="font-size:1.9rem;">⚓ Seleziona un membro della ciurma ⚓</h2>
                </div>

                <div id="luggage-area" style="display: none;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                        <h2 id="current-pirate" style="color: var(--gold); font-size: 1.9rem;"></h2>
                        <button onclick="deleteCurrentCrew()" style="background:#c00; color:white; padding:10px 16px; border:none; cursor:pointer;">
                            🏴‍☠️ Caccia il Pirata
                        </button>
                    </div>

                    <div class="progress" id="progress">0% del baule pronto</div>
                    <div id="categories"></div>

                    <div style="text-align: center; margin: 25px 0;">
                        <button onclick="resetAllForCurrent()" style="background:#3C2F2F; color:var(--gold); padding:14px 24px; border:3px solid var(--gold);">
                            🧹 Svuota tutto il baule
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="icon-picker"></div>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBdZ264Yz_C-ev2BukH1z4cVDPaDr60wD0",
            authDomain: "check-bagagli.firebaseapp.com",
            databaseURL: "https://check-bagagli-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "check-bagagli",
            storageBucket: "check-bagagli.firebasestorage.app",
            messagingSenderId: "957942770779",
            appId: "1:957942770779:web:bf7ec145e0391272eae37e"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const crewRef = db.ref('crew');

        let crew = [];
        let currentCrewId = null;
        let currentEditingId = null;

        const categories = ["Vestiti","Igiene","Salute","Documenti e Finanze","Tecnologia","Libri e Giocattoli","Accessori","Altro"];
        const availableIcons = ["🧭", "👨‍🍳", "⚓", "💰", "👦🏻", "👧🏻", "⚙️"];

        // Ascolta cambiamenti in tempo reale
        crewRef.on('value', (snapshot) => {
            const data = snapshot.val();
            crew = data ? Object.values(data) : [];
            renderCrewList();
            if (currentCrewId) renderLuggage();
        });

        function saveCrew() {
            const crewObj = {};
            crew.forEach(member => crewObj[member.id] = member);
            crewRef.set(crewObj);
        }

        function renderCrewList() {
            const container = document.getElementById('crew-list');
            container.innerHTML = '';

            crew.forEach(member => {
                const progress = calculateProgress(member);
                const div = document.createElement('div');
                div.className = `crew-member ${member.id === currentCrewId ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="crew-header">
                        <span onclick="openIconPicker('${member.id}'); event.stopImmediatePropagation()" class="icon-select">${member.icon}</span>
                        <span>${member.name}</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
                    <small style="float:right; margin-top:4px; color:#555;">${progress}%</small>
                `;
                div.onclick = () => selectCrew(member.id);
                container.appendChild(div);
            });
        }

        function calculateProgress(member) {
            let total = 0, checked = 0;
            Object.values(member.items || {}).forEach(arr => {
                total += arr.length;
                checked += arr.filter(i => i.checked).length;
            });
            return total === 0 ? 0 : Math.round((checked / total) * 100);
        }

        function openIconPicker(id) {
            currentEditingId = id;
            const picker = document.getElementById('icon-picker');
            picker.innerHTML = `<div style="color:var(--gold); margin-bottom:15px; text-align:center; width:100%;">Scegli icona</div>`;

            availableIcons.forEach(icon => {
                const el = document.createElement('div');
                el.className = 'icon-option';
                el.textContent = icon;
                el.onclick = () => {
                    const member = crew.find(m => m.id === currentEditingId);
                    if (member) member.icon = icon;
                    saveCrew();
                    renderCrewList();
                    picker.style.display = 'none';
                };
                picker.appendChild(el);
            });
            picker.style.display = 'flex';
        }

        function addCrewMember() {
            const name = document.getElementById('new-crew-name').value.trim();
            if (!name) return alert("Inserisci un nome per il pirata!");

            const newMember = {
                id: Date.now().toString(),
                name: name,
                icon: availableIcons[0],
                items: {}
            };

            crew.push(newMember);
            saveCrew();
            selectCrew(newMember.id);
            document.getElementById('new-crew-name').value = '';
        }

        function selectCrew(id) {
            currentCrewId = id;
            renderCrewList();
            renderLuggage();
        }

        function getCurrentCrew() {
            return crew.find(m => m.id === currentCrewId);
        }

        function renderLuggage() {
            const member = getCurrentCrew();
            if (!member) return;

            document.getElementById('no-selection').style.display = 'none';
            document.getElementById('luggage-area').style.display = 'block';
            document.getElementById('current-pirate').textContent = member.name;

            const container = document.getElementById('categories');
            container.innerHTML = '';
            let total = 0, checked = 0;

            categories.forEach(cat => {
                if (!member.items[cat]) member.items[cat] = [];

                const itemsHTML = member.items[cat].map((item, idx) => {
                    total++;
                    if (item.checked) checked++;
                    return `
                        <div class="item">
                            <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleCheck('${member.id}', '${cat}', ${idx})">
                            <span>${item.name}</span>
                            <button class="delete-btn" onclick="removeItem('${member.id}', '${cat}', ${idx})">✕</button>
                        </div>`;
                }).join('');

                const catDiv = document.createElement('div');
                catDiv.className = 'category';
                catDiv.innerHTML = `
                    <div class="category-header">
                        <span>${cat}</span>
                        <span>${member.items[cat].length}</span>
                    </div>
                    <div class="item-list">${itemsHTML}</div>
                    <div class="add-item">
                        <input type="text" id="add-input-${cat}" placeholder="Aggiungi...">
                        <button onclick="addItem('${cat}')">Aggiungi</button>
                    </div>
                `;
                container.appendChild(catDiv);
            });

            const perc = total ? Math.round((checked / total) * 100) : 0;
            document.getElementById('progress').textContent = `${perc}% del baule pronto`;
        }

        function addItem(cat) {
            const member = getCurrentCrew();
            if (!member) return;
            const input = document.getElementById(`add-input-${cat}`);
            const name = input.value.trim();
            if (!name) return;
            member.items[cat].push({name, checked: false});
            saveCrew();
            renderLuggage();
            input.value = '';
        }

        function toggleCheck(crewId, cat, idx) {
            const member = crew.find(m => m.id === crewId);
            if (member?.items[cat]) {
                member.items[cat][idx].checked = !member.items[cat][idx].checked;
                saveCrew();
                renderLuggage();
            }
        }

        function removeItem(crewId, cat, idx) {
            if (!confirm("Eliminare questo oggetto?")) return;
            const member = crew.find(m => m.id === crewId);
            if (member?.items[cat]) {
                member.items[cat].splice(idx, 1);
                saveCrew();
                renderLuggage();
            }
        }

        function deleteCurrentCrew() {
            if (!confirm("Cacciare questo pirata dalla ciurma?")) return;
            crew = crew.filter(m => m.id !== currentCrewId);
            currentCrewId = crew.length ? crew[0].id : null;
            saveCrew();
            renderCrewList();
            currentCrewId ? renderLuggage() : 
                (document.getElementById('luggage-area').style.display = 'none',
                 document.getElementById('no-selection').style.display = 'block');
        }

        function resetAllForCurrent() {
            const member = getCurrentCrew();
            if (!member || !confirm("Svuotare completamente il baule?")) return;
            member.items = {};
            saveCrew();
            renderLuggage();
        }

        // Avvio
        window.onload = () => {
            if (crew.length > 0 && !currentCrewId) currentCrewId = crew[0].id;
            renderCrewList();
            if (currentCrewId) renderLuggage();
        };
    </script>
</body>
</html>
